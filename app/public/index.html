<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>レストラン地図メモ</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">🍜 レストラン地図メモ</div>
    <div class="search">
      <input id="searchInput" type="search" placeholder="レストラン名で検索" />
      <button id="searchBtn">検索</button>
    </div>
    <nav class="links">
      <a href="/privacy.html" target="_blank" rel="noopener">プライバシーポリシー</a>
    </nav>
  </header>

  <main class="content">
    <div id="map" class="map"></div>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-content">
      <button id="modalClose" class="modal-close" aria-label="閉じる">×</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="/app.js" type="module"></script>
</body>
</html>
